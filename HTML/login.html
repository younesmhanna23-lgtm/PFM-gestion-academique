<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Page de Connexion</title>
    <link rel="stylesheet" href="../CSS/login.css">
    <link rel="icon" href="../IMAGES/mundiapolis icon.ico" type="image/x-icon">

</head>
<body>

    <div class="overlay"></div>

    <div class="container">
        <img src="../IMAGES/logo mundiapolis.png" alt="Logo Université" class="login-logo">
        
        <h1>Bienvenue</h1>
        <p>Connectez-vous à votre compte</p>

        <form id="login-form">
            <input type="text" id="username" placeholder="Nom d'utilisateur" required>
            <input type="password" id="password" placeholder="Mot de passe" required>
            <button type="submit" data-i18n="login_btn">Se connecter</button>
            <a href="https://w3schoolsua.github.io/css/css_positioning_en.html#google_vignette">Mot de passe oublié ?</a>
            <div id="login-message" style="color: #ff4d4d; margin-top: 10px; font-size: 14px;"></div>
        </form>
    </div>

</body>
</html>
