<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Page de Connexion</title>
    <link rel="stylesheet" href="../CSS/login.css">
    <link rel="icon" href="../IMAGES/mundiapolis icon.ico" type="image/x-icon">
</head>
<body>

    <div class="overlay"></div>

    <div class="container">
        <img src="../IMAGES/logo mundiapolis.png" alt="Logo Université" class="login-logo">
        
        <h1>Bienvenue</h1>
        <p>Connectez-vous à votre compte</p>

        <form>
            <input type="text" placeholder="Nom d'utilisateur">
            <input type="password" placeholder="Mot de passe">
            <button type="submit">Se connecter</button>
            <a href="https://w3schoolsua.github.io/css/css_positioning_en.html#google_vignette">Mot de passe oublié ?</a>
        </form>
    </div>

</body>
</html>
